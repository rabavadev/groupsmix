name = "yourrank-consumer"
main = "src/worker.js"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

[[queues.producers]]
queue = "yourrank-events"
binding = "EVENTS_QUEUE"

[[queues.consumers]]
queue = "yourrank-events"
max_batch_size = 50
max_batch_timeout = 5
max_retries = 3
# TODO: create a dead-letter queue via `wrangler queues create yourrank-events-dlq`
# once Cloudflare supports auto-creation or it has been provisioned manually.

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "9e5b625bfdd84cd691b44c4780bdaf13"

[vars]
IP_HASH_SALT = ""
